<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rupee Expense Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      border-bottom: 2px solid #2ecc71;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      color: #2ecc71;
      letter-spacing: 0.1em;
    }

    header p {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
    }

    .total-amount {
      font-size: 2.5rem;
      color: #2ecc71;
      font-weight: bold;
    }

    .total-amount span {
      font-size: 1rem;
      color: #666;
    }

    .category-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #222;
    }

    .category-row:last-child { border-bottom: none; }

    .category-name {
      color: #aaa;
      font-size: 0.9rem;
    }

    .category-bar-wrap {
      flex: 1;
      margin: 0 1rem;
      background: #222;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .category-bar {
      height: 100%;
      background: #2ecc71;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .category-amount {
      color: #e8e8e8;
      font-size: 0.9rem;
      min-width: 80px;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      color: #666;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #2a2a2a;
    }

    td {
      padding: 0.75rem;
      border-bottom: 1px solid #1f1f1f;
      color: #ccc;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #1f1f1f; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge-Food { background: #1a3a1a; color: #2ecc71; }
    .badge-Transport { background: #1a2a3a; color: #3498db; }
    .badge-Entertainment { background: #3a1a3a; color: #9b59b6; }
    .badge-Shopping { background: #3a2a1a; color: #e67e22; }
    .badge-Bills { background: #3a1a1a; color: #e74c3c; }

    .amount-cell { color: #2ecc71; font-weight: bold; }

    .empty {
      text-align: center;
      color: #444;
      padding: 3rem;
      font-size: 0.9rem;
    }

    .error {
      background: #1a0a0a;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #2ecc71;
      color: #2ecc71;
      padding: 0.4rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 3px;
      float: right;
      margin-top: 0.5rem;
    }

    .refresh-btn:hover { background: #2ecc71; color: #0f0f0f; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>₹ Expense Tracker</h1>
  <p>Personal finance dashboard — data from expenses.json</p>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</header>

<div id="error-box" class="error" style="display:none"></div>

<div class="grid">
  <div class="card">
    <h2>Total Spent</h2>
    <div class="total-amount" id="total">₹0.00</div>
    <p style="color:#666; font-size:0.8rem; margin-top:0.5rem;" id="count">0 expenses</p>
  </div>
  <div class="card">
    <h2>By Category</h2>
    <div id="categories"><p style="color:#444">No data yet</p></div>
  </div>
</div>

<div class="card">
  <h2>All Expenses</h2>
  <div id="table-wrap"></div>
</div>

<script>
  const CATEGORIES = ["Food", "Transport", "Entertainment", "Shopping", "Bills"];

  async function loadData() {
    const errorBox = document.getElementById('error-box');
    errorBox.style.display = 'none';

    try {
      const res = await fetch('expenses.json?t=' + Date.now());
      if (!res.ok) throw new Error('Could not load expenses.json');
      const expenses = await res.json();
      render(expenses);
    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.textContent = '⚠ ' + err.message + ' — Make sure expenses.json is in the same folder and you are running a local server (e.g. VS Code Live Server).';
      render([]);
    }
  }

  function render(expenses) {
    const total = expenses.reduce((s, e) => s + e.amount, 0);
    document.getElementById('total').textContent = '₹' + total.toFixed(2);
    document.getElementById('count').textContent = expenses.length + ' expense' + (expenses.length !== 1 ? 's' : '');

    // Category breakdown
    const bycat = {};
    CATEGORIES.forEach(c => bycat[c] = 0);
    expenses.forEach(e => { if (bycat[e.category] !== undefined) bycat[e.category] += e.amount; });
    const maxVal = Math.max(...Object.values(bycat), 1);

    const catHTML = CATEGORIES.map(cat => {
      const pct = (bycat[cat] / maxVal * 100).toFixed(1);
      return `<div class="category-row">
        <span class="category-name">${cat}</span>
        <div class="category-bar-wrap"><div class="category-bar" style="width:${pct}%"></div></div>
        <span class="category-amount">₹${bycat[cat].toFixed(2)}</span>
      </div>`;
    }).join('');
    document.getElementById('categories').innerHTML = catHTML || '<p style="color:#444">No data</p>';

    // Expense table
    if (expenses.length === 0) {
      document.getElementById('table-wrap').innerHTML = '<p class="empty">No expenses yet. Add one using the C++ program.</p>';
      return;
    }

    const sorted = [...expenses].reverse();
    const rows = sorted.map(e => `
      <tr>
        <td>${e.date}</td>
        <td><span class="badge badge-${e.category}">${e.category}</span></td>
        <td>${e.description}</td>
        <td class="amount-cell">₹${e.amount.toFixed(2)}</td>
      </tr>
    `).join('');

    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>    
    `;
  }

  loadData();
</script>
</body>
</html>
